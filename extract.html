<!DOCTYPE html>
<html>
<head><title>Extract</title></head>
<body>
<canvas id='c'></canvas>
<pre id='out'></pre>
<script>
  const img = new Image();
  img.onload = () => {
    const W = img.width; const H = img.height;
    const c = document.getElementById('c');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0,0,W,H).data;
    
    // threshold
    const bin = new Uint8Array(W*H);
    for(let i=0; i<W*H; i++) {
        let r = d[i*4], g = d[i*4+1], b = d[i*4+2];
        if (r < 100 && g < 100 && b < 100) bin[i] = 1;
    }
    
    // connected components ...
    // Actually, to make it simpler, we can just save it or display it for analysis.
    let minX=W, minY=H, maxX=0, maxY=0;
    for(let y=0; y<H; y++) {
        for(let x=0; x<W; x++) {
             if (bin[y*W+x]) {
                 if(x<minX)minX=x; if(y<minY)minY=y;
                 if(x>maxX)maxX=x; if(y>maxY)maxY=y;
             }
        }
    }
    document.getElementById('out').innerText = "W:" + W + " H:" + H + " BBox:" + minX + "," + minY + " to " + maxX + "," + maxY;
  };
  img.src = 'data:image/jpeg;base64,' + $b64;
</script>
</body></html>
